##############################################################################
# NuVatis NuGet Publish (Trusted Publishing)
#
# 작성자: 최진호
# 작성일: 2026-02-25
# 수정일: 2026-03-06 (Test 단계 --no-build 제거, --no-restore 추가 — NETSDK1005 해결)
#
# 트리거: v* 태그 push (예: v0.1.0-alpha.1, v1.0.0)
# 동작:
#   1. test  — TF별 병렬 빌드+테스트 (net6~net11, 6 runners 동시)
#   2. pack  — 전체 멀티타겟 패키지 생성 및 artifact 업로드
#   3. publish — environment: release (수동 승인 게이트) → NuGet push + GitHub Release
#
# 사전 요구사항:
#   - NuGet.org에서 Trusted Publishing 정책 등록
#     - Repository owner: JinHo-von-Choi
#     - Repository name: nuvatis
#     - Workflow file: publish.yml
#     - Environment: release
#   - GitHub Secrets: NUGET_USER (NuGet.org 사용자명)
##############################################################################

name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  ##############################################################################
  # Job 1: 테스트 — TF별 병렬 matrix (6 runners 동시 실행)
  ##############################################################################
  test:
    name: Test (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        include:
          - dotnet: '6.0.x'
            tfm: net6.0
          - dotnet: '7.0.x'
            tfm: net7.0
          - dotnet: '8.0.x'
            tfm: net8.0
          - dotnet: '9.0.x'
            tfm: net9.0
          - dotnet: '10.0.x'
            tfm: net10.0
          - dotnet: '11.0.x'
            tfm: net11.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET (stable SDKs)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Setup .NET 11 (preview/prerelease)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore NuVatis.sln

      - name: Build (all TFs)
        run: |
          dotnet build NuVatis.sln \
            --configuration Release \
            --no-restore \
            /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test — Generators (${{ matrix.tfm }})
        run: |
          dotnet test tests/NuVatis.Generators.Tests/ \
            --configuration Release \
            --framework ${{ matrix.tfm }} \
            --no-restore \
            --verbosity normal

      - name: Test — Core (${{ matrix.tfm }})
        run: |
          dotnet test tests/NuVatis.Tests/ \
            --configuration Release \
            --framework ${{ matrix.tfm }} \
            --no-restore \
            --verbosity normal \
            --filter "Category!=E2E"

  ##############################################################################
  # Job 2: Pack — 모든 TF 테스트 통과 후 전체 멀티타겟 패키지 생성
  ##############################################################################
  pack:
    name: Pack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET (stable SDKs)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Setup .NET 11 (preview/prerelease)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Packing version: ${TAG}"

      - name: Restore
        run: dotnet restore NuVatis.sln

      - name: Pack (all TFs)
        run: |
          dotnet pack NuVatis.sln \
            --configuration Release \
            --no-restore \
            --output ./nupkg \
            /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Verify packages
        run: |
          EXPECTED=(
            "NuVatis.Core"
            "NuVatis.Generators"
            "NuVatis.PostgreSql"
            "NuVatis.MySql"
            "NuVatis.SqlServer"
            "NuVatis.Sqlite"
            "NuVatis.Extensions.DependencyInjection"
            "NuVatis.Extensions.OpenTelemetry"
            "NuVatis.Extensions.EntityFrameworkCore"
            "NuVatis.Extensions.Aspire"
            "NuVatis.Testing"
          )
          MISSING=0
          for PKG in "${EXPECTED[@]}"; do
            COUNT=$(ls ./nupkg/${PKG}.*.nupkg 2>/dev/null | wc -l)
            if [[ ${COUNT} -eq 0 ]]; then
              echo "MISSING: ${PKG}"
              MISSING=$((MISSING + 1))
            else
              echo "OK: $(ls ./nupkg/${PKG}.*.nupkg)"
            fi
          done
          if [[ ${MISSING} -gt 0 ]]; then
            echo "::error::${MISSING} package(s) missing!"
            exit 1
          fi
          echo "All ${#EXPECTED[@]} packages verified."

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-${{ steps.version.outputs.VERSION }}
          path: |
            ./nupkg/*.nupkg
            ./nupkg/*.snupkg
          retention-days: 90

  ##############################################################################
  # Job 3: Publish — environment: release 수동 승인 게이트 → NuGet push
  ##############################################################################
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: pack

    environment: release

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET (push용 단일 SDK)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg-${{ needs.pack.outputs.version }}
          path: ./nupkg

      - name: NuGet login (OIDC Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          for NUPKG in ./nupkg/*.nupkg; do
            echo "Pushing $(basename "${NUPKG}")..."
            dotnet nuget push "${NUPKG}" \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
          echo "All packages pushed successfully."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.pack.outputs.version }}
          name: NuVatis v${{ needs.pack.outputs.version }}
          body_path: CHANGELOG.md
          files: |
            ./nupkg/*.nupkg
            ./nupkg/*.snupkg
          draft: false
          prerelease: ${{ contains(needs.pack.outputs.version, '-') }}
